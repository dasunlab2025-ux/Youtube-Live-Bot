name: Daily YouTube Vertical Live

on:
  schedule:
    # ලංකාවේ වෙලාවෙන් දවල් 1:30 ට (UTC 08:00)
    - cron: '0 8 * * *' 
  workflow_dispatch: 

jobs:
  live-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg & gdown
        run: |
          sudo apt update
          sudo apt install ffmpeg -y
          pip install gdown

      - name: Download Video from Google Drive
        run: |
          # දැන් ID එක එන්නේ Repository Variable එකකින් (Live Controller එක හරහා)
          gdown ${{ vars.DRIVE_FILE_ID }} -O video.mp4

      - name: Start Streaming to YouTube (1 Hour & 4 Seconds)
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # -t 18000 මගින් පැයයි තත්පර 4ක කාලයක් ලබා දෙයි
          ffmpeg -re -stream_loop -1 -i video.mp4 -c:v copy -c:a aac -t 3604 -f flv rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY
